<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 620" font-family="ui-monospace, SFMono-Regular, Menlo, monospace">
  <rect width="1200" height="620" fill="#fbfaf8"/>

  <text x="300" y="80" text-anchor="middle" font-size="22" letter-spacing="3" fill="#8f897c">A PATH</text>
  <text x="300" y="110" text-anchor="middle" font-size="17" fill="#b3ac9c">the order you walked</text>
  <text x="880" y="80" text-anchor="middle" font-size="22" letter-spacing="3" fill="#8f897c">A MAP</text>
  <text x="880" y="110" text-anchor="middle" font-size="17" fill="#b3ac9c">the shape of the place</text>

  <!-- left: straight path down -->
  <g stroke="#d8d2c6" stroke-width="2.5">
    <line x1="300" y1="172" x2="300" y2="226"/>
    <line x1="300" y1="250" x2="300" y2="304"/>
    <line x1="300" y1="328" x2="300" y2="382"/>
    <line x1="300" y1="406" x2="300" y2="460"/>
    <line x1="300" y1="484" x2="300" y2="538"/>
  </g>
  <g text-anchor="middle" font-size="16">
    <circle cx="300" cy="158" r="15" fill="#f1eee8" stroke="#e3ded4" stroke-width="2"/><text x="300" y="164" fill="#26231f">1</text>
    <circle cx="300" cy="238" r="15" fill="#f1eee8" stroke="#e3ded4" stroke-width="2"/><text x="300" y="244" fill="#26231f">2</text>
    <circle cx="300" cy="316" r="15" fill="#f1eee8" stroke="#e3ded4" stroke-width="2"/><text x="300" y="322" fill="#26231f">3</text>
    <circle cx="300" cy="394" r="15" fill="#f1eee8" stroke="#e3ded4" stroke-width="2"/><text x="300" y="400" fill="#26231f">4</text>
    <circle cx="300" cy="472" r="15" fill="#f1eee8" stroke="#e3ded4" stroke-width="2"/><text x="300" y="478" fill="#26231f">5</text>
    <circle cx="300" cy="550" r="15" fill="#f1eee8" stroke="#e3ded4" stroke-width="2"/><text x="300" y="556" fill="#26231f">6</text>
  </g>
  <text x="360" y="322" font-size="16" fill="#b3ac9c">scroll ↓</text>

  <!-- right: same numbered ideas, arranged by relation -->
  <g stroke="#d8d2c6" stroke-width="2.5">
    <line x1="880" y1="210" x2="770" y2="320"/>
    <line x1="880" y1="210" x2="990" y2="320"/>
    <line x1="770" y1="320" x2="700" y2="440"/>
    <line x1="770" y1="320" x2="840" y2="440"/>
    <line x1="990" y1="320" x2="1060" y2="440"/>
  </g>
  <!-- cross-link: ideas 3 and 5 relate though far apart in order -->
  <path d="M 840 440 C 900 480, 1000 480, 1060 440" fill="none" stroke="#b45309" stroke-width="2.5" stroke-dasharray="6 6"/>
  <text x="950" y="505" text-anchor="middle" font-size="15" fill="#b45309">connected — though far apart in the order</text>

  <g text-anchor="middle" font-size="16">
    <circle cx="880" cy="200" r="17" fill="#fdf3e7" stroke="#b45309" stroke-width="2.5"/><text x="880" y="206" fill="#7a4a12">1</text>
    <circle cx="770" cy="320" r="15" fill="#f1eee8" stroke="#e3ded4" stroke-width="2"/><text x="770" y="326" fill="#26231f">2</text>
    <circle cx="990" cy="320" r="15" fill="#f1eee8" stroke="#e3ded4" stroke-width="2"/><text x="990" y="326" fill="#26231f">4</text>
    <circle cx="700" cy="440" r="15" fill="#f1eee8" stroke="#e3ded4" stroke-width="2"/><text x="700" y="446" fill="#26231f">6</text>
    <circle cx="840" cy="440" r="15" fill="#f1eee8" stroke="#e3ded4" stroke-width="2"/><text x="840" y="446" fill="#26231f">3</text>
    <circle cx="1060" cy="440" r="15" fill="#f1eee8" stroke="#e3ded4" stroke-width="2"/><text x="1060" y="446" fill="#26231f">5</text>
  </g>

  <line x1="600" y1="140" x2="600" y2="540" stroke="#eee9df" stroke-width="2"/>
  <text x="600" y="592" text-anchor="middle" font-size="18" fill="#b3ac9c">same six ideas — only one arrangement shows how they relate</text>
</svg>
