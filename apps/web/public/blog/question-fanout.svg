<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 620" font-family="ui-monospace, SFMono-Regular, Menlo, monospace">
  <rect width="1200" height="620" fill="#fbfaf8"/>

  <!-- edges: root to four answers -->
  <path d="M 290 310 C 380 310, 400 145, 480 145" fill="none" stroke="#d8d2c6" stroke-width="2.5"/>
  <path d="M 290 310 C 380 310, 400 255, 480 255" fill="none" stroke="#b45309" stroke-width="3.5"/>
  <path d="M 290 310 C 380 310, 400 365, 480 365" fill="none" stroke="#d8d2c6" stroke-width="2.5"/>
  <path d="M 290 310 C 380 310, 400 475, 480 475" fill="none" stroke="#d8d2c6" stroke-width="2.5"/>

  <!-- edges: sub-fans -->
  <path d="M 660 255 C 740 255, 760 200, 830 200" fill="none" stroke="#b45309" stroke-width="3.5"/>
  <path d="M 660 255 C 740 255, 760 310, 830 310" fill="none" stroke="#d8d2c6" stroke-width="2.5"/>
  <path d="M 660 475 C 740 475, 760 500, 830 500" fill="none" stroke="#d8d2c6" stroke-width="2.5"/>

  <!-- root -->
  <rect x="110" y="278" width="180" height="64" rx="13" fill="#fdf3e7" stroke="#b45309" stroke-width="2.5"/>
  <text x="200" y="305" text-anchor="middle" font-size="18" fill="#7a4a12">one substantive</text>
  <text x="200" y="327" text-anchor="middle" font-size="18" fill="#7a4a12">question</text>

  <!-- answers -->
  <g>
    <rect x="480" y="115" width="180" height="60" rx="12" fill="#f1eee8" stroke="#e3ded4"/>
    <rect x="500" y="135" width="140" height="8" rx="4" fill="#d8d2c6"/>
    <rect x="500" y="151" width="104" height="8" rx="4" fill="#d8d2c6"/>

    <rect x="480" y="225" width="180" height="60" rx="12" fill="#fdf3e7" stroke="#b45309" stroke-width="2.5"/>
    <rect x="500" y="245" width="140" height="8" rx="4" fill="#e3c49a"/>
    <rect x="500" y="261" width="112" height="8" rx="4" fill="#e3c49a"/>

    <rect x="480" y="335" width="180" height="60" rx="12" fill="#f1eee8" stroke="#e3ded4"/>
    <rect x="500" y="355" width="140" height="8" rx="4" fill="#d8d2c6"/>
    <rect x="500" y="371" width="96" height="8" rx="4" fill="#d8d2c6"/>

    <rect x="480" y="445" width="180" height="60" rx="12" fill="#f1eee8" stroke="#e3ded4"/>
    <rect x="500" y="465" width="140" height="8" rx="4" fill="#d8d2c6"/>
    <rect x="500" y="481" width="120" height="8" rx="4" fill="#d8d2c6"/>
  </g>

  <!-- sub-answers -->
  <rect x="830" y="170" width="180" height="60" rx="12" fill="#fdf3e7" stroke="#b45309" stroke-width="2.5"/>
  <rect x="850" y="190" width="140" height="8" rx="4" fill="#e3c49a"/>
  <rect x="850" y="206" width="100" height="8" rx="4" fill="#e3c49a"/>

  <rect x="830" y="280" width="180" height="60" rx="12" fill="#f1eee8" stroke="#e3ded4"/>
  <rect x="850" y="300" width="140" height="8" rx="4" fill="#d8d2c6"/>
  <rect x="850" y="316" width="116" height="8" rx="4" fill="#d8d2c6"/>

  <rect x="830" y="470" width="180" height="60" rx="12" fill="#f1eee8" stroke="#e3ded4"/>
  <rect x="850" y="490" width="140" height="8" rx="4" fill="#d8d2c6"/>
  <rect x="850" y="506" width="92" height="8" rx="4" fill="#d8d2c6"/>

  <text x="200" y="392" text-anchor="middle" font-size="17" fill="#8f897c">where you start</text>
  <text x="570" y="80" text-anchor="middle" font-size="17" fill="#8f897c">each section is an entry point</text>
  <text x="920" y="130" text-anchor="middle" font-size="17" fill="#b45309">…and branches again</text>

  <text x="600" y="586" text-anchor="middle" font-size="18" fill="#b3ac9c">a tree of answers, grown from one question</text>
</svg>
