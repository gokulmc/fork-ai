<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 560" font-family="ui-monospace, SFMono-Regular, Menlo, monospace">
  <rect width="1200" height="560" fill="#fbfaf8"/>

  <!-- grid -->
  <g stroke="#eee9df" stroke-width="1.5">
    <line x1="130" y1="150" x2="1110" y2="150"/>
    <line x1="130" y1="230" x2="1110" y2="230"/>
    <line x1="130" y1="310" x2="1110" y2="310"/>
    <line x1="130" y1="390" x2="1110" y2="390"/>
  </g>

  <!-- axes -->
  <line x1="130" y1="110" x2="130" y2="440" stroke="#26231f" stroke-width="2.5"/>
  <line x1="130" y1="440" x2="1110" y2="440" stroke="#26231f" stroke-width="2.5"/>

  <!-- fill under curve -->
  <path d="M 150 150 C 350 170, 430 400, 618 412 C 810 400, 900 185, 1085 158 L 1085 440 L 150 440 Z" fill="#b45309" opacity="0.06"/>
  <!-- curve -->
  <path d="M 150 150 C 350 170, 430 400, 618 412 C 810 400, 900 185, 1085 158" fill="none" stroke="#b45309" stroke-width="4.5" stroke-linecap="round"/>

  <circle cx="150" cy="150" r="8" fill="#b45309"/>
  <circle cx="618" cy="412" r="8" fill="#b45309"/>
  <circle cx="1085" cy="158" r="8" fill="#b45309"/>

  <text x="618" y="372" text-anchor="middle" font-size="21" fill="#b45309">“lost in the middle”</text>

  <!-- labels -->
  <text x="60" y="280" font-size="19" fill="#8f897c" transform="rotate(-90 60 280)" text-anchor="middle">retrieval accuracy</text>
  <text x="620" y="520" text-anchor="middle" font-size="19" fill="#8f897c">position of the key fact in the context window</text>
  <text x="150" y="472" text-anchor="middle" font-size="18" fill="#26231f">start</text>
  <text x="618" y="472" text-anchor="middle" font-size="18" fill="#26231f">middle</text>
  <text x="1085" y="472" text-anchor="middle" font-size="18" fill="#26231f">end</text>

  <text x="1108" y="84" text-anchor="end" font-size="16" fill="#b3ac9c">after Liu et al., 2023</text>
</svg>
