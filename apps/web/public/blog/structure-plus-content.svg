<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 580" font-family="ui-monospace, SFMono-Regular, Menlo, monospace">
  <rect width="1200" height="580" fill="#fbfaf8"/>

  <text x="220" y="80" text-anchor="middle" font-size="19" letter-spacing="2" fill="#8f897c">MIND MAP</text>
  <text x="220" y="106" text-anchor="middle" font-size="15" fill="#b3ac9c">structure, no content</text>
  <text x="600" y="80" text-anchor="middle" font-size="19" letter-spacing="2" fill="#8f897c">LLM CHAT</text>
  <text x="600" y="106" text-anchor="middle" font-size="15" fill="#b3ac9c">content, no structure</text>
  <text x="980" y="80" text-anchor="middle" font-size="19" letter-spacing="2" fill="#b45309">MIND-MAP LLM</text>
