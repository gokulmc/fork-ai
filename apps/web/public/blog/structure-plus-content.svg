    <rect x="500" y="298" width="190" height="9" rx="4.5"/>
    <rect x="500" y="330" width="170" height="9" rx="4.5"/>
    <rect x="500" y="348" width="200" height="9" rx="4.5"/>
    <rect x="500" y="366" width="140" height="9" rx="4.5"/>
    <rect x="500" y="398" width="190" height="9" rx="4.5"/>
