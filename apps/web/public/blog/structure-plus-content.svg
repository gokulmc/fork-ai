  <line x1="980" y1="248" x2="980" y2="362" stroke="#b45309" stroke-width="3"/>
  <rect x="910" y="190" width="140" height="58" rx="12" fill="#fdf3e7" stroke="#b45309" stroke-width="2.5"/>
  <rect x="926" y="206" width="108" height="7" rx="3.5" fill="#e3c49a"/>
  <rect x="926" y="220" width="84" height="7" rx="3.5" fill="#e3c49a"/>

  <rect x="838" y="362" width="112" height="52" rx="11" fill="#f1eee8" stroke="#e3ded4"/>
  <rect x="852" y="376" width="84" height="7" rx="3.5" fill="#b3ac9c"/>
  <rect x="852" y="390" width="64" height="7" rx="3.5" fill="#b3ac9c"/>

