<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 620" font-family="ui-monospace, SFMono-Regular, Menlo, monospace">
  <rect width="1200" height="620" fill="#fbfaf8"/>

  <!-- edges -->
  <g stroke="#d8d2c6" stroke-width="2.5" fill="none">
    <path d="M 290 240 C 290 290, 170 290, 170 340"/>
    <path d="M 290 240 C 290 290, 410 290, 410 340"/>
  </g>
  <path d="M 290 240 L 290 340" stroke="#b45309" stroke-width="3.5"/>
  <path d="M 290 396 C 290 440, 290 450, 290 470" stroke="#b45309" stroke-width="3.5" fill="none"/>

  <!-- subject -->
  <rect x="200" y="180" width="180" height="60" rx="13" fill="#f1eee8" stroke="#e3ded4"/>
  <text x="290" y="217" text-anchor="middle" font-size="18" fill="#26231f">the subject</text>

  <!-- areas -->
  <rect x="100" y="340" width="140" height="56" rx="12" fill="#f1eee8" stroke="#e3ded4"/>
  <text x="170" y="367" text-anchor="middle" font-size="15" fill="#8f897c">solid ✓</text>
  <text x="170" y="386" text-anchor="middle" font-size="13" fill="#b3ac9c">skip for now</text>

  <rect x="220" y="340" width="140" height="56" rx="12" fill="#fdf3e7" stroke="#b45309" stroke-width="2.5"/>
  <text x="290" y="367" text-anchor="middle" font-size="15" fill="#7a4a12">shaky</text>
  <text x="290" y="386" text-anchor="middle" font-size="13" fill="#b45309">go here</text>

  <rect x="340" y="340" width="140" height="56" rx="12" fill="#f1eee8" stroke="#e3ded4"/>
  <text x="410" y="367" text-anchor="middle" font-size="15" fill="#8f897c">solid ✓</text>
  <text x="410" y="386" text-anchor="middle" font-size="13" fill="#b3ac9c">skip for now</text>

  <!-- the hard concept -->
  <rect x="190" y="470" width="200" height="56" rx="12" fill="#fdf3e7" stroke="#b45309" stroke-width="2.5"/>
  <text x="290" y="505" text-anchor="middle" font-size="16" fill="#7a4a12">the hard concept</text>

  <!-- active loop on the right -->
  <path d="M 390 498 C 480 498, 500 470, 560 440" fill="none" stroke="#b45309" stroke-width="3"/>

  <ellipse cx="790" cy="330" rx="230" ry="170" fill="none" stroke="#eee9df" stroke-width="2"/>

  <rect x="640" y="170" width="300" height="56" rx="12" fill="#ffffff" stroke="#e3ded4"/>
  <text x="790" y="205" text-anchor="middle" font-size="16" fill="#26231f">model explains the concept</text>

  <rect x="640" y="412" width="300" height="76" rx="12" fill="#fdf3e7" stroke="#b45309" stroke-width="2.5"/>
  <text x="790" y="443" text-anchor="middle" font-size="16" fill="#7a4a12">you explain it back —</text>
  <text x="790" y="467" text-anchor="middle" font-size="16" fill="#7a4a12">“what did I get wrong?”</text>

  <!-- loop arrows -->
  <path d="M 952 240 C 1010 280, 1010 380, 952 412" fill="none" stroke="#b45309" stroke-width="3"/>
  <path d="M 952 412 l 4 -17 l 10 13 z" fill="#b45309"/>
  <path d="M 628 412 C 570 380, 570 280, 628 240" fill="none" stroke="#b45309" stroke-width="3"/>
  <path d="M 628 240 l -4 17 l -10 -13 z" fill="#b45309"/>
  <text x="1052" y="334" font-size="16" fill="#b45309">repeat until</text>
  <text x="1052" y="356" font-size="16" fill="#b45309">it sticks</text>

  <text x="600" y="586" text-anchor="middle" font-size="18" fill="#b3ac9c">branch into your gaps, then stay active — explaining beats reading</text>
</svg>
