<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 620" font-family="ui-monospace, SFMono-Regular, Menlo, monospace">
  <rect width="1200" height="620" fill="#fbfaf8"/>

  <text x="300" y="80" text-anchor="middle" font-size="22" letter-spacing="3" fill="#8f897c">WRITE-ONLY</text>
  <text x="300" y="110" text-anchor="middle" font-size="17" fill="#b3ac9c">a beautifully organized graveyard</text>
  <text x="890" y="80" text-anchor="middle" font-size="22" letter-spacing="3" fill="#8f897c">A SECOND BRAIN</text>
  <text x="890" y="110" text-anchor="middle" font-size="17" fill="#b3ac9c">retrieval by navigation</text>

  <!-- left: pile of documents, big in-arrow, blocked out-arrow -->
  <g>
    <rect x="226" y="276" width="190" height="120" rx="8" fill="#ffffff" stroke="#e3ded4" transform="rotate(-4 321 336)"/>
    <rect x="218" y="262" width="190" height="120" rx="8" fill="#ffffff" stroke="#e3ded4" transform="rotate(3 313 322)"/>
    <rect x="210" y="250" width="190" height="120" rx="8" fill="#ffffff" stroke="#e3ded4"/>
    <rect x="228" y="272" width="150" height="9" rx="4.5" fill="#d8d2c6"/>
    <rect x="228" y="292" width="120" height="9" rx="4.5" fill="#d8d2c6"/>
    <rect x="228" y="312" width="138" height="9" rx="4.5" fill="#d8d2c6"/>
  </g>
  <!-- capture arrow in -->
  <line x1="300" y1="150" x2="300" y2="230" stroke="#26231f" stroke-width="5"/>
  <path d="M 300 240 l -11 -16 l 22 0 z" fill="#26231f"/>
  <text x="330" y="195" font-size="16" fill="#26231f">capture: easy</text>
  <!-- retrieval arrow out, blocked -->
  <line x1="300" y1="400" x2="300" y2="460" stroke="#c4452e" stroke-width="3" stroke-dasharray="6 6"/>
  <line x1="278" y1="468" x2="322" y2="492" stroke="#c4452e" stroke-width="3.5"/>
  <line x1="322" y1="468" x2="278" y2="492" stroke="#c4452e" stroke-width="3.5"/>
  <text x="345" y="478" font-size="16" fill="#c4452e">retrieval: never happens</text>

  <!-- right: map with navigation in and out -->
  <g stroke="#d8d2c6" stroke-width="2.5" fill="none">
    <path d="M 890 220 C 890 260, 790 260, 790 300"/>
    <path d="M 890 220 C 890 260, 990 260, 990 300"/>
    <path d="M 790 352 C 790 390, 740 390, 740 426"/>
  </g>
  <path d="M 990 352 C 990 390, 1040 390, 1040 426" stroke="#b45309" stroke-width="3" fill="none"/>

  <rect x="810" y="166" width="160" height="54" rx="12" fill="#f1eee8" stroke="#e3ded4"/>
  <text x="890" y="199" text-anchor="middle" font-size="16" fill="#26231f">old research</text>
  <rect x="716" y="300" width="148" height="52" rx="11" fill="#f1eee8" stroke="#e3ded4"/>
  <text x="790" y="332" text-anchor="middle" font-size="15" fill="#8f897c">mechanisms</text>
  <rect x="916" y="300" width="148" height="52" rx="11" fill="#f1eee8" stroke="#e3ded4"/>
  <text x="990" y="332" text-anchor="middle" font-size="15" fill="#8f897c">applications</text>
  <rect x="666" y="426" width="148" height="50" rx="11" fill="#f1eee8" stroke="#e3ded4"/>
  <text x="740" y="457" text-anchor="middle" font-size="15" fill="#8f897c">last month</text>
  <rect x="966" y="426" width="148" height="50" rx="11" fill="#fdf3e7" stroke="#b45309" stroke-width="2.5"/>
  <text x="1040" y="450" text-anchor="middle" font-size="14" fill="#7a4a12">this week’s question</text>
  <text x="1040" y="468" text-anchor="middle" font-size="13" fill="#b45309">attaches here</text>

  <text x="890" y="540" text-anchor="middle" font-size="16" fill="#b45309">finding it is navigation, not archaeology</text>

  <line x1="600" y1="140" x2="600" y2="540" stroke="#eee9df" stroke-width="2"/>
  <text x="600" y="592" text-anchor="middle" font-size="18" fill="#b3ac9c">a second brain is only as valuable as what you can get back out</text>
</svg>
