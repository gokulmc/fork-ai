<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 620" font-family="ui-monospace, SFMono-Regular, Menlo, monospace">
  <rect width="1200" height="620" fill="#fbfaf8"/>

  <!-- edges with relationship labels -->
  <line x1="380" y1="200" x2="700" y2="160" stroke="#d8d2c6" stroke-width="2.5"/>
  <rect x="470" y="158" width="120" height="30" rx="15" fill="#fbfaf8" stroke="#e3ded4"/>
  <text x="530" y="178" text-anchor="middle" font-size="15" fill="#8f897c">causes</text>

  <line x1="330" y1="240" x2="280" y2="420" stroke="#d8d2c6" stroke-width="2.5"/>
  <rect x="218" y="315" width="148" height="30" rx="15" fill="#fbfaf8" stroke="#e3ded4"/>
  <text x="292" y="335" text-anchor="middle" font-size="15" fill="#8f897c">is part of</text>

  <line x1="780" y1="200" x2="860" y2="400" stroke="#d8d2c6" stroke-width="2.5"/>
  <rect x="740" y="285" width="170" height="30" rx="15" fill="#fbfaf8" stroke="#e3ded4"/>
  <text x="825" y="305" text-anchor="middle" font-size="15" fill="#8f897c">depends on</text>

  <line x1="350" y1="450" x2="800 " y2="435" stroke="#c4452e" stroke-width="2.5" stroke-dasharray="7 6"/>
  <rect x="490" y="426" width="160" height="32" rx="16" fill="#fbfaf8" stroke="#c4452e"/>
  <text x="570" y="447" text-anchor="middle" font-size="15" fill="#c4452e">contradicts</text>

  <line x1="700" y1="180" x2="350" y2="430" stroke="#d8d2c6" stroke-width="2.5"/>

  <!-- nodes -->
  <rect x="240" y="172" width="160" height="58" rx="13" fill="#fdf3e7" stroke="#b45309" stroke-width="2.5"/>
  <text x="320" y="207" text-anchor="middle" font-size="17" fill="#7a4a12">concept A</text>

  <rect x="700" y="132" width="160" height="58" rx="13" fill="#f1eee8" stroke="#e3ded4"/>
  <text x="780" y="167" text-anchor="middle" font-size="17" fill="#26231f">concept B</text>

  <rect x="200" y="420" width="160" height="58" rx="13" fill="#f1eee8" stroke="#e3ded4"/>
  <text x="280" y="455" text-anchor="middle" font-size="17" fill="#26231f">concept C</text>

  <rect x="790" y="400" width="160" height="58" rx="13" fill="#f1eee8" stroke="#e3ded4"/>
  <text x="870" y="435" text-anchor="middle" font-size="17" fill="#26231f">concept D</text>

  <!-- interrogation branch on the contradicts link -->
  <path d="M 570 458 C 570 500, 600 500, 610 516" fill="none" stroke="#b45309" stroke-width="3"/>
  <rect x="610" y="500" width="320" height="38" rx="10" fill="#fdf3e7" stroke="#b45309" stroke-width="2.5"/>
  <text x="770" y="525" text-anchor="middle" font-size="15" fill="#7a4a12">“causal, or just correlated? what’s the mechanism?”</text>

  <text x="990" y="180" text-anchor="end" font-size="16" fill="#b3ac9c">links carry meaning —</text>
  <text x="990" y="204" text-anchor="end" font-size="16" fill="#b3ac9c">treat each one as a claim</text>

  <text x="600" y="586" text-anchor="middle" font-size="18" fill="#b3ac9c">a network, not a hierarchy: concepts hold each other up</text>
</svg>
