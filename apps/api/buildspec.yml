version: 0.2

env:
  variables:
    AWS_DEFAULT_REGION: ap-south-1
    IMAGE_REPO_NAME: forkai-api
    EB_APP_NAME: forkai-api
    EB_ENV_NAME: forkai-api-prod
    S3_BUCKET: forkai-eb-artifacts
  secrets-manager:
    ANTHROPIC_API_KEY: forkai/anthropic-api-key
    NOTION_CLIENT_SECRET: forkai/notion-client-secret
    GEMINI_API_KEY: forkai/gemini-api-key
    DEEPSEEK_API_KEY: forkai/deepseek-api-key

phases:
  pre_build:
    commands:
      - AWS_ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
      - ECR_REPO=$AWS_ACCOUNT_ID.dkr.ecr.$AWS_DEFAULT_REGION.amazonaws.com/$IMAGE_REPO_NAME
      - aws ecr get-login-password --region $AWS_DEFAULT_REGION | docker login --username AWS --password-stdin $ECR_REPO
      - IMAGE_TAG=$CODEBUILD_RESOLVED_SOURCE_VERSION
  build:
    commands:
      - docker build -f apps/api/Dockerfile -t $ECR_REPO:$IMAGE_TAG -t $ECR_REPO:latest .
  post_build:
    commands:
      - docker push $ECR_REPO:$IMAGE_TAG
      - docker push $ECR_REPO:latest
      - printf '{"AWSEBDockerrunVersion":"1","Image":{"Name":"%s","Update":"true"},"Ports":[{"ContainerPort":8080}]}' $ECR_REPO:$IMAGE_TAG > Dockerrun.aws.json
      # Upload artifact to S3
      - aws s3 cp Dockerrun.aws.json s3://$S3_BUCKET/$IMAGE_TAG/Dockerrun.aws.json
      # Create EB application version (no-op if this commit was already registered)
      - aws elasticbeanstalk create-application-version --application-name $EB_APP_NAME --version-label $IMAGE_TAG --source-bundle S3Bucket=$S3_BUCKET,S3Key=$IMAGE_TAG/Dockerrun.aws.json --region $AWS_DEFAULT_REGION || true
      # Deploy new version and inject secrets in one call to avoid OperationInProgress conflict
      - aws elasticbeanstalk update-environment --application-name $EB_APP_NAME --environment-name $EB_ENV_NAME --version-label $IMAGE_TAG --region $AWS_DEFAULT_REGION --option-settings "Namespace=aws:elasticbeanstalk:application:environment,OptionName=ANTHROPIC_API_KEY,Value=$ANTHROPIC_API_KEY" "Namespace=aws:elasticbeanstalk:application:environment,OptionName=NOTION_CLIENT_SECRET,Value=$NOTION_CLIENT_SECRET" "Namespace=aws:elasticbeanstalk:application:environment,OptionName=GEMINI_API_KEY,Value=$GEMINI_API_KEY" "Namespace=aws:elasticbeanstalk:application:environment,OptionName=DEEPSEEK_API_KEY,Value=$DEEPSEEK_API_KEY"

artifacts:
  files:
    - Dockerrun.aws.json
