# Long-running non-streaming LLM branch calls (Opus + Verbose + Web search across
# multiple Anthropic pause_turn round-trips) can exceed nginx's 60s default
# proxy_read_timeout, which severs the connection and surfaces as a blank/504.
# Raise it (paired with the Classic LB idle timeout, also raised to 300s) so
# neither proxy cuts an in-flight answer. 300s matches the answer-length ceiling.
proxy_read_timeout 300s;
proxy_send_timeout 300s;
