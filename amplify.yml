version: 1
applications:
  - appRoot: apps/web
    frontend:
      phases:
        preBuild:
          commands:
            - cd $(pwd)/../../
            # --prefer-offline reuses the cached .npm store (below); --no-audit/--no-fund
            # skip network round-trips. npm ci wipes node_modules every run, so caching
            # node_modules is pointless — cache the npm download store instead.
            - npm ci --prefer-offline --no-audit --no-fund --cache apps/web/.npm
        build:
          commands:
            - npm run build
      artifacts:
        baseDirectory: .next
        files:
          - '**/*'
      cache:
        paths:
          - .npm/**/*
          - .next/cache/**/*
