version: 1
applications:
  - appRoot: apps/web
    frontend:
      phases:
        preBuild:
          commands:
            - cd $CODEBUILD_SRC_DIR
            - npm ci
        build:
          commands:
            - cd $CODEBUILD_SRC_DIR/apps/web
            - npm run build
      artifacts:
        baseDirectory: .next
        files:
          - '**/*'
      cache:
        paths:
          - .next/cache/**/*
          - node_modules/**/*
