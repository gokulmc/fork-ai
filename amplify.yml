version: 1
applications:
  - appRoot: apps/web
    frontend:
      phases:
        preBuild:
          commands:
            - echo "CODEBUILD_SRC_DIR=$CODEBUILD_SRC_DIR PWD=$(pwd)"
            - REPO_ROOT=$(cd $CODEBUILD_SRC_DIR && ls package-lock.json > /dev/null 2>&1 && echo $CODEBUILD_SRC_DIR || echo $CODEBUILD_SRC_DIR/../..)
            - echo "REPO_ROOT=$REPO_ROOT"
            - cd $REPO_ROOT && npm ci
        build:
          commands:
            - npm run build
      artifacts:
        baseDirectory: .next
        files:
          - '**/*'
      cache:
        paths:
          - .next/cache/**/*
          - node_modules/**/*
